<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- style.css -->
    <link rel="stylesheet" href="style.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!--icons-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <title>Contact</title>
  </head>

  <body>
    <div class="contact-container">
      <!-- Back Button -->
      <a href="index.html" class="back-btn">&larr;Back</a>

      <!-- Header-->
      <div class="contact-header">
        <h1>Get In Touch</h1>

        <p>
          I'd love to hear from you! Fill out the form and <br />
          I'll get back to you as soon as possible.
        </p>
      </div>
      <!-- Contact Form -->
      <form class="contact-form">
        <!-- Form Fields -->
        <div class="contact-name">
          <input type="text" id="firstname" placeholder="First Name" required />

          <input type="text" id="lastname" placeholder="Last Name" required />
        </div>
        <div class="contact-details">
          <input type="text" id="email" placeholder="Emai Address" required />
          <input
            type="number"
            id="phonenumber"
            placeholder="Phone Number"
            required
          />
        </div>

        <input
          type="text"
          id="address"
          placeholder="Address"
          class="full-width"
          required
        />

        <textarea
          id="message"
          placeholder="Your Message"
          rows="6"
          class="full-width"
        ></textarea>

        <button type="submit">Submit</button>
      </form>
      <footer>
        <p>&copy; 2023 Saravana Kumar Subramanian. All rights reserved.</p>
      </footer>
    </div>
  </body>
</html>
